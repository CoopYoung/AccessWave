services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - db-data:/app/data
    restart: unless-stopped

  # Optional PostgreSQL service.
  # Start with: docker compose --profile postgres up
  # Set DATABASE_URL=postgresql+asyncpg://accesswave:accesswave@postgres:5432/accesswave in .env
  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: accesswave
      POSTGRES_PASSWORD: accesswave
      POSTGRES_DB: accesswave
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accesswave"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  db-data:
  pg-data:
