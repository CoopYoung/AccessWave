<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - AccessWave</title>
    <meta name="description" content="The page you were looking for could not be found.">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <nav aria-label="Main navigation"><div class="container">
        <a href="/" class="logo">Access<span>Wave</span></a>
        <div class="links">
            <a href="/login">Log in</a>
            <a href="/register" class="btn btn-primary btn-sm">Start Free</a>
        </div>
    </div></nav>

    <main class="error-page" id="main-content">
        <div class="error-page-inner">
            <div class="error-code" aria-hidden="true">404</div>
            <h1>Page not found</h1>
            <p>The page you&#39;re looking for doesn&#39;t exist or has been moved.<br>Double-check the URL, or use one of the links below to get back on track.</p>
            <div class="error-actions">
                <a href="/" class="btn btn-primary">Go to Home</a>
                <a href="/dashboard" class="btn btn-outline">Go to Dashboard</a>
            </div>
        </div>
    </main>

    <footer><div class="container"><p>AccessWave &mdash; Making the web accessible, one scan at a time.</p></div></footer>
</body>
</html>
