<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#6366f1" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#4f46e5" media="(prefers-color-scheme: dark)">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <title>You&#39;re Offline - AccessWave</title>
    <meta name="description" content="It looks like you&#39;re not connected to the internet. Check your connection and try again.">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <nav aria-label="Main navigation"><div class="container">
        <a href="/" class="logo">Access<span>Wave</span></a>
        <div class="links">
            <a href="/dashboard">Dashboard</a>
        </div>
    </div></nav>

    <main class="error-page" id="main-content">
        <div class="error-page-inner">
            <div class="error-code" aria-hidden="true" style="font-size:4rem">&#9888;</div>
            <h1>You&#39;re offline</h1>
            <p>It looks like you&#39;re not connected to the internet.<br>
               Check your connection and try again &mdash; previously visited pages may still be available.</p>
            <div class="error-actions">
                <button class="btn btn-primary" onclick="window.location.reload()">Try Again</button>
                <a href="/dashboard" class="btn btn-outline">Go to Dashboard</a>
            </div>
        </div>
    </main>

    <footer><div class="container"><p>AccessWave &mdash; Making the web accessible, one scan at a time.</p></div></footer>
</body>
</html>
