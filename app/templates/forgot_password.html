<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#6366f1" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#4f46e5" media="(prefers-color-scheme: dark)">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <title>Forgot password - AccessWave</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script>(function(){var t=localStorage.getItem('aw_theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');})();</script>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <nav aria-label="Main navigation"><div class="container">
        <a href="/" class="logo">Access<span>Wave</span></a>
        <button class="nav-toggle" aria-expanded="false" aria-label="Toggle navigation" aria-controls="nav-links">
            <span></span><span></span><span></span>
        </button>
        <div class="links" id="nav-links">
            <a href="/login" class="btn btn-outline btn-sm">Log in</a>
            <a href="/register" class="btn btn-primary btn-sm">Start Free</a>
            <button class="dark-toggle" id="dark-toggle" aria-label="Switch to dark mode" aria-pressed="false">🌙</button>
        </div>
    </div></nav>

    <main id="main-content">
    <div class="auth-page"><div class="auth-card">
        <h2>Forgot your password?</h2>
        <p class="subtitle">Enter your email and we'll send you a reset link</p>

        <div id="success-msg" class="success-banner" role="status" aria-live="polite" hidden></div>
        <div id="error-msg" class="error-msg" role="alert" aria-live="assertive"></div>

        <form id="forgot-form" novalidate>
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" required
                       placeholder="you@example.com" autocomplete="email">
            </div>
            <button type="submit" class="btn btn-primary" id="submit-btn">Send reset link</button>
        </form>

        <p class="footer">
            Remember your password? <a href="/login">Back to log in</a>
        </p>
    </div></div>
    </main>

    <script src="/static/js/app.js"></script>
    <script>
    initDarkMode();
    (function () {
        const form = document.getElementById('forgot-form');
        const submitBtn = document.getElementById('submit-btn');
        const errorEl = document.getElementById('error-msg');
        const successEl = document.getElementById('success-msg');

        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            errorEl.style.display = 'none';
            errorEl.textContent = '';
            successEl.hidden = true;

            const email = document.getElementById('email').value.trim();
            if (!email) {
                errorEl.textContent = 'Please enter your email address.';
                errorEl.style.display = 'block';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending\u2026';

            try {
                const resp = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await resp.json();
                if (resp.ok) {
                    form.hidden = true;
                    successEl.textContent = data.message || 'If that email is registered, a reset link has been sent. Check your inbox.';
                    successEl.hidden = false;
                } else {
                    errorEl.textContent = data.detail || 'Something went wrong. Please try again.';
                    errorEl.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Send reset link';
                }
            } catch (_) {
                errorEl.textContent = 'Network error. Please check your connection and try again.';
                errorEl.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send reset link';
            }
        });
    })();
    </script>
</body>
</html>
