<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Log in - AccessWave</title><link rel="stylesheet" href="/static/css/style.css"></head>
<body>
    <nav><div class="container"><a href="/" class="logo">Access<span>Wave</span></a></div></nav>
    <div class="auth-page"><div class="auth-card">
        <h2>Welcome back</h2><p class="subtitle">Log in to your dashboard</p>
        <div id="error-msg" class="error-msg"></div>
        <form id="auth-form">
            <div class="form-group"><label>Email</label><input type="email" id="email" name="email" required placeholder="you@example.com"></div>
            <div class="form-group"><label>Password</label><input type="password" id="password" name="password" required></div>
            <button type="submit" class="btn btn-primary">Sign In</button>
        </form>
        <p class="footer">No account? <a href="/register">Sign up free</a></p>
    </div></div>
    <script src="/static/js/app.js"></script><script>initAuth('login');</script>
</body></html>
