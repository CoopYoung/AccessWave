<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in - AccessWave</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script>(function(){var t=localStorage.getItem('aw_theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');})();</script>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <nav aria-label="Main navigation"><div class="container">
        <a href="/" class="logo">Access<span>Wave</span></a>
        <button class="nav-toggle" aria-expanded="false" aria-label="Toggle navigation" aria-controls="nav-links">
            <span></span><span></span><span></span>
        </button>
        <div class="links" id="nav-links">
            <a href="/register" class="btn btn-primary btn-sm">Start Free</a>
            <button class="dark-toggle" id="dark-toggle" aria-label="Switch to dark mode" aria-pressed="false">🌙</button>
        </div>
    </div></nav>

    <main id="main-content">
    <div class="auth-page"><div class="auth-card">
        <h2>Welcome back</h2><p class="subtitle">Log in to your dashboard</p>
        <div id="error-msg" class="error-msg" role="alert"></div>

        <!-- Step 1: email + password -->
        <form id="auth-form" novalidate>
            <div class="form-group"><label for="email">Email</label><input type="email" id="email" name="email" required placeholder="you@example.com" autocomplete="email"></div>
            <div class="form-group"><label for="password">Password</label><input type="password" id="password" name="password" required autocomplete="current-password"></div>
            <button type="submit" class="btn btn-primary">Sign In</button>
        </form>

        <!-- Step 2: TOTP code (shown only when 2FA is required) -->
        <form id="totp-form" novalidate hidden aria-label="Two-factor authentication">
            <p style="color:var(--text-muted);font-size:0.875rem;margin-bottom:16px">
                Enter the 6-digit code from your authenticator app.
            </p>
            <div class="form-group">
                <label for="totp-code">Authenticator code</label>
                <input type="text" id="totp-code" name="totp_code" inputmode="numeric"
                       pattern="[0-9 ]{6,7}" maxlength="7" required
                       autocomplete="one-time-code" placeholder="000000"
                       aria-describedby="totp-hint"
                       style="letter-spacing:0.25em;font-size:1.2rem;text-align:center">
                <span id="totp-hint" class="field-hint">6-digit code — refreshes every 30 seconds</span>
            </div>
            <div style="display:flex;gap:10px;flex-wrap:wrap">
                <button type="submit" class="btn btn-primary">Verify</button>
                <button type="button" id="totp-back-btn" class="btn btn-outline">Back</button>
            </div>
        </form>

        <p class="footer"><a href="/forgot-password">Forgot your password?</a></p>
        <p class="footer">No account? <a href="/register">Sign up free</a></p>
    </div></div>
    </main>

    <script src="/static/js/app.js"></script>
    <script>initDarkMode(); initAuth('login');</script>
</body>
</html>
