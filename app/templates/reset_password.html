<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset password - AccessWave</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script>(function(){var t=localStorage.getItem('aw_theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');})();</script>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <nav aria-label="Main navigation"><div class="container">
        <a href="/" class="logo">Access<span>Wave</span></a>
        <button class="nav-toggle" aria-expanded="false" aria-label="Toggle navigation" aria-controls="nav-links">
            <span></span><span></span><span></span>
        </button>
        <div class="links" id="nav-links">
            <a href="/login" class="btn btn-outline btn-sm">Log in</a>
            <button class="dark-toggle" id="dark-toggle" aria-label="Switch to dark mode" aria-pressed="false">🌙</button>
        </div>
    </div></nav>

    <main id="main-content">
    <div class="auth-page"><div class="auth-card">
        <h2>Choose a new password</h2>
        <p class="subtitle">Enter a new password for your account</p>

        <div id="success-msg" class="success-banner" role="status" aria-live="polite" hidden></div>
        <div id="error-msg" class="error-msg" role="alert" aria-live="assertive"></div>

        <div id="invalid-token-msg" hidden>
            <p style="color:var(--text-muted);margin-bottom:16px;">
                This reset link is invalid or has expired.
                Reset links are valid for 15 minutes and can only be used once.
            </p>
            <a href="/forgot-password" class="btn btn-primary">Request a new link</a>
        </div>

        <form id="reset-form" novalidate>
            <div class="form-group">
                <label for="new-password">New password</label>
                <input type="password" id="new-password" name="new_password" required
                       autocomplete="new-password" minlength="8"
                       aria-describedby="pw-hint">
                <span id="pw-hint" class="field-hint">At least 8 characters</span>
            </div>
            <div class="form-group">
                <label for="confirm-password">Confirm new password</label>
                <input type="password" id="confirm-password" name="confirm_password" required
                       autocomplete="new-password" minlength="8">
            </div>
            <button type="submit" class="btn btn-primary" id="submit-btn">Set new password</button>
        </form>

        <p class="footer">
            <a href="/login">Back to log in</a>
        </p>
    </div></div>
    </main>

    <script src="/static/js/app.js"></script>
    <script>
    initDarkMode();
    (function () {
        const resetToken = "{{ token | e }}";
        const form = document.getElementById('reset-form');
        const submitBtn = document.getElementById('submit-btn');
        const errorEl = document.getElementById('error-msg');
        const successEl = document.getElementById('success-msg');
        const invalidEl = document.getElementById('invalid-token-msg');

        if (!resetToken) {
            form.hidden = true;
            invalidEl.hidden = false;
        }

        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            errorEl.style.display = 'none';
            errorEl.textContent = '';

            const newPw = document.getElementById('new-password').value;
            const confirmPw = document.getElementById('confirm-password').value;

            if (newPw.length < 8) {
                errorEl.textContent = 'Password must be at least 8 characters.';
                errorEl.style.display = 'block';
                return;
            }
            if (newPw !== confirmPw) {
                errorEl.textContent = 'Passwords do not match.';
                errorEl.style.display = 'block';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Saving\u2026';

            try {
                const resp = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: resetToken, new_password: newPw })
                });
                const data = await resp.json();
                if (resp.ok) {
                    form.hidden = true;
                    successEl.textContent = data.message || 'Password updated! Redirecting to log in\u2026';
                    successEl.hidden = false;
                    setTimeout(() => { window.location.href = '/login'; }, 2500);
                } else if (resp.status === 400) {
                    form.hidden = true;
                    invalidEl.hidden = false;
                } else {
                    errorEl.textContent = data.detail || 'Something went wrong. Please try again.';
                    errorEl.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Set new password';
                }
            } catch (_) {
                errorEl.textContent = 'Network error. Please check your connection and try again.';
                errorEl.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Set new password';
            }
        });
    })();
    </script>
</body>
</html>
