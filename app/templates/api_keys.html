<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Keys - AccessWave</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .keys-page { padding: 32px 0; max-width: 760px; margin: 0 auto; }
        .keys-page h1 { margin-bottom: 6px; }
        .keys-page .subtitle { color: var(--text-muted); margin-bottom: 28px; font-size: 0.95rem; }

        .key-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 10px;
        }
        .key-card .key-icon {
            width: 40px; height: 40px; border-radius: 8px;
            background: var(--primary-light); color: var(--primary);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; flex-shrink: 0;
        }
        .key-card .key-info { flex: 1; min-width: 0; }
        .key-card .key-name { font-weight: 600; font-size: 0.95rem; }
        .key-card .key-meta { color: var(--text-muted); font-size: 0.82rem; margin-top: 2px; }
        .key-card .key-prefix {
            font-family: 'Courier New', Courier, monospace;
            background: var(--surface-2); border: 1px solid var(--border);
            padding: 3px 10px; border-radius: 6px; font-size: 0.82rem;
            color: var(--text-muted); white-space: nowrap;
        }
        .key-card .badge-expired { background: var(--red-light); color: var(--red); }

        .new-key-banner {
            background: var(--green-light);
            border: 1px solid var(--green);
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 20px;
            display: none;
        }
        .new-key-banner p { font-size: 0.88rem; color: var(--green); margin-bottom: 10px; font-weight: 600; }
        .key-value-row { display: flex; align-items: center; gap: 8px; }
        .key-value-row code {
            flex: 1; font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem; background: #fff; border: 1px solid var(--green);
            padding: 8px 12px; border-radius: 8px; word-break: break-all;
            color: var(--text);
        }

        .create-form {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 24px;
            margin-bottom: 28px;
        }
        .create-form h2 { font-size: 1rem; margin-bottom: 16px; }
        .create-form .row { display: flex; gap: 12px; align-items: flex-end; }
        .create-form .row .form-group { flex: 1; margin-bottom: 0; }
        .create-form .row select {
            width: 100%; padding: 10px 14px; border-radius: 8px;
            border: 1px solid var(--border); font-size: 0.9rem; font-family: inherit;
            background: #fff;
        }

        .empty-state {
            text-align: center; padding: 48px 0; color: var(--text-muted);
        }
        .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
        .empty-state p { font-size: 0.9rem; }

        @media (max-width: 600px) {
            .key-card { flex-wrap: wrap; }
            .key-card .key-prefix { display: none; }
            .create-form .row { flex-direction: column; }
            .create-form .row .form-group { width: 100%; }
        }
    </style>
</head>
<body>
    <nav><div class="container">
        <a href="/" class="logo">Access<span>Wave</span></a>
        <div class="links">
            <a href="/dashboard">Dashboard</a>
            <a href="#" id="logout-btn">Log out</a>
        </div>
    </div></nav>

    <div class="container">
        <div class="keys-page">
            <h1>API Keys</h1>
            <p class="subtitle">
                Use API keys to authenticate programmatic requests.
                Pass the key as a Bearer token:
                <code style="font-size:0.82rem;background:var(--surface-2);padding:2px 6px;border-radius:4px;">Authorization: Bearer aw_...</code>
            </p>

            <!-- Newly-created key banner (shown once) -->
            <div id="new-key-banner" class="new-key-banner" role="alert" aria-live="polite">
                <p>&#x2713; Copy your API key now — it won't be shown again.</p>
                <div class="key-value-row">
                    <code id="new-key-value"></code>
                    <button class="btn btn-sm btn-outline" onclick="copyKey()" aria-label="Copy API key to clipboard">Copy</button>
                </div>
            </div>

            <!-- Create form -->
            <div class="create-form">
                <h2>Create new API key</h2>
                <div id="create-error" class="error-msg" role="alert"></div>
                <form id="create-form" novalidate>
                    <div class="row">
                        <div class="form-group">
                            <label for="key-name">Key name</label>
                            <input type="text" id="key-name" name="name" required
                                   maxlength="100" placeholder="e.g. CI pipeline"
                                   autocomplete="off" aria-required="true">
                        </div>
                        <div class="form-group">
                            <label for="key-expires">Expires in</label>
                            <select id="key-expires" name="expires_in_days" aria-label="Key expiration">
                                <option value="">Never</option>
                                <option value="30">30 days</option>
                                <option value="90">90 days</option>
                                <option value="180">180 days</option>
                                <option value="365">1 year</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary btn-sm" style="white-space:nowrap">
                            + Create key
                        </button>
                    </div>
                </form>
            </div>

            <!-- Key list -->
            <div id="keys-list">
                <p style="color:var(--text-muted)">Loading...</p>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
    (function () {
        const token = localStorage.getItem('token');
        if (!token) { window.location.href = '/login'; return; }

        document.getElementById('logout-btn').addEventListener('click', function (e) {
            e.preventDefault();
            localStorage.removeItem('token');
            window.location.href = '/login';
        });

        async function api(method, path, body) {
            const opts = {
                method,
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json',
                },
            };
            if (body !== undefined) opts.body = JSON.stringify(body);
            const res = await fetch(path, opts);
            if (!res.ok) {
                const err = await res.json().catch(() => ({ detail: 'Request failed' }));
                throw new Error(err.detail || 'Request failed');
            }
            if (res.status === 204) return null;
            return res.json();
        }

        function fmtDate(iso) {
            if (!iso) return null;
            return new Date(iso).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function isExpired(iso) {
            return iso && new Date(iso) < new Date();
        }

        function renderKeys(keys) {
            const el = document.getElementById('keys-list');
            if (!keys.length) {
                el.innerHTML = `
                    <div class="empty-state">
                        <div class="icon" aria-hidden="true">&#x1F511;</div>
                        <p>No API keys yet. Create one above to get started.</p>
                    </div>`;
                return;
            }

            el.innerHTML = keys.map(k => {
                const expired = isExpired(k.expires_at);
                const expireLabel = k.expires_at
                    ? (expired
                        ? `<span class="badge badge-expired">Expired ${fmtDate(k.expires_at)}</span>`
                        : `Expires ${fmtDate(k.expires_at)}`)
                    : 'No expiry';
                const lastUsed = k.last_used_at ? `Last used ${fmtDate(k.last_used_at)}` : 'Never used';
                return `
                <div class="key-card" data-id="${k.id}">
                    <div class="key-icon" aria-hidden="true">&#x1F511;</div>
                    <div class="key-info">
                        <div class="key-name">${escHtml(k.name)}</div>
                        <div class="key-meta">${lastUsed} &middot; ${expireLabel} &middot; Created ${fmtDate(k.created_at)}</div>
                    </div>
                    <code class="key-prefix" title="Key prefix">${escHtml(k.key_prefix)}…</code>
                    <button class="btn btn-sm btn-danger"
                            onclick="revokeKey(${k.id}, '${escHtml(k.name)}')"
                            aria-label="Revoke API key ${escHtml(k.name)}">
                        Revoke
                    </button>
                </div>`;
            }).join('');
        }

        function escHtml(s) {
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        async function loadKeys() {
            try {
                const keys = await api('GET', '/api/keys');
                renderKeys(keys);
            } catch (e) {
                document.getElementById('keys-list').innerHTML =
                    `<p style="color:var(--red)">Failed to load keys: ${escHtml(e.message)}</p>`;
            }
        }

        document.getElementById('create-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const errEl = document.getElementById('create-error');
            errEl.style.display = 'none';

            const name = document.getElementById('key-name').value.trim();
            const expVal = document.getElementById('key-expires').value;
            const body = { name };
            if (expVal) body.expires_in_days = parseInt(expVal, 10);

            try {
                const created = await api('POST', '/api/keys', body);
                document.getElementById('new-key-value').textContent = created.key;
                const banner = document.getElementById('new-key-banner');
                banner.style.display = 'block';
                banner.focus();
                document.getElementById('key-name').value = '';
                document.getElementById('key-expires').value = '';
                await loadKeys();
            } catch (err) {
                errEl.textContent = err.message;
                errEl.style.display = 'block';
            }
        });

        window.revokeKey = async function (id, name) {
            if (!confirm(`Revoke API key "${name}"? Any integrations using it will stop working immediately.`)) return;
            try {
                await api('DELETE', '/api/keys/' + id);
                // Hide banner if it shows the revoked key (we can't tell which, so just hide it)
                document.getElementById('new-key-banner').style.display = 'none';
                await loadKeys();
            } catch (err) {
                alert('Failed to revoke key: ' + err.message);
            }
        };

        window.copyKey = function () {
            const val = document.getElementById('new-key-value').textContent;
            navigator.clipboard.writeText(val).then(function () {
                const btn = document.querySelector('#new-key-banner .btn');
                btn.textContent = 'Copied!';
                setTimeout(function () { btn.textContent = 'Copy'; }, 2000);
            }).catch(function () {
                alert('Copy failed — please select and copy the key manually.');
            });
        };

        loadKeys();
    }());
    </script>
</body>
</html>
