<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Sign up - AccessWave</title><link rel="stylesheet" href="/static/css/style.css"></head>
<body>
    <nav><div class="container"><a href="/" class="logo">Access<span>Wave</span></a></div></nav>
    <div class="auth-page"><div class="auth-card">
        <h2>Create your account</h2><p class="subtitle">Scan your first site in 30 seconds</p>
        <div id="error-msg" class="error-msg"></div>
        <form id="auth-form">
            <div class="form-group"><label>Email</label><input type="email" id="email" name="email" required placeholder="you@example.com"></div>
            <div class="form-group"><label>Password</label><input type="password" id="password" name="password" required minlength="8" placeholder="Min 8 characters"></div>
            <button type="submit" class="btn btn-primary">Create Account</button>
        </form>
        <p class="footer">Already have an account? <a href="/login">Log in</a></p>
    </div></div>
    <script src="/static/js/app.js"></script><script>initAuth('register');</script>
</body></html>
